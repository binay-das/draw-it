services:
  db:
    image: postgres:16-alpine
    container_name: draw_it_postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - draw_it_data:/var/lib/postgresql/data

volumes:
  draw_it_data: